name: Generate contribution snake

on:
  schedule:
    - cron: "0 3 * * *"   # daily 03:00 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Viralpatelz
          outputs: |
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00f0ff&color_dots=#0d1117,#1a2340,#7b2fff,#b56bff,#00f0ff

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
