<svg width="1000" height="360" viewBox="0 0 1000 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#02030a"/>
      <stop offset="0.55" stop-color="#060a18"/>
      <stop offset="1" stop-color="#0a1224"/>
    </linearGradient>
    <linearGradient id="aur1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3dffb8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#3dffb8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7ee7ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aur2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ee7ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4fd8a8" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#b593ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="aur3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b593ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#b593ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#3dffb8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleAur" x1="330" y1="150" x2="670" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ee7ff">
        <animate attributeName="stop-color" values="#7ee7ff;#3dffb8;#b593ff;#7ee7ff" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#3dffb8">
        <animate attributeName="stop-color" values="#3dffb8;#b593ff;#7ee7ff;#3dffb8" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#b593ff">
        <animate attributeName="stop-color" values="#b593ff;#7ee7ff;#3dffb8;#b593ff" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="auroraBlur" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="360" fill="url(#sky)"/>

  <!-- starfield -->
  <g fill="#cfe8ff">
    <circle cx="60" cy="40" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="145" cy="90" r="0.9"><animate attributeName="opacity" values="1;0.15;1" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="230" cy="35" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="70" r="0.8"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="30" r="1"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4.5s" repeatCount="indefinite"/></circle>
    <circle cx="520" cy="55" r="0.9"><animate attributeName="opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="610" cy="28" r="1.2"><animate attributeName="opacity" values="0.25;1;0.25" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="75" r="0.8"><animate attributeName="opacity" values="0.9;0.2;0.9" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="42" r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="88" r="0.9"><animate attributeName="opacity" values="1;0.25;1" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="50" r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="175" cy="150" r="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="5s" repeatCount="indefinite"/></circle>
    <circle cx="840" cy="150" r="0.8"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="4.6s" repeatCount="indefinite"/></circle>
  </g>

  <!-- shooting star -->
  <g opacity="0.9">
    <line x1="0" y1="0" x2="34" y2="18" stroke="#cfe8ff" stroke-width="1.4" stroke-linecap="round">
      <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.06;0.14;1" dur="9s" repeatCount="indefinite"/>
    </line>
    <animateMotion dur="9s" repeatCount="indefinite" path="M180 20 L560 130 M180 20 L560 130" keyPoints="0;1;1" keyTimes="0;0.14;1" calcMode="linear"/>
  </g>

  <!-- AURORA ribbons (blurred, drifting) -->
  <g filter="url(#auroraBlur)">
    <path d="M-50 150 C150 40 320 140 500 70 C680 10 850 120 1050 40 L1050 -20 L-50 -20 Z" fill="url(#aur1)">
      <animateTransform attributeName="transform" type="translate" values="0 0;30 14;-20 6;0 0" dur="14s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0.65;0.8" dur="11s" repeatCount="indefinite"/>
    </path>
    <path d="M-50 190 C180 90 380 180 560 110 C740 50 880 150 1050 90 L1050 -20 L-50 -20 Z" fill="url(#aur2)">
      <animateTransform attributeName="transform" type="translate" values="0 0;-36 10;22 18;0 0" dur="17s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.95;0.7;0.6" dur="13s" repeatCount="indefinite"/>
    </path>
    <path d="M-50 120 C120 60 300 110 480 60 C660 15 840 90 1050 30 L1050 -20 L-50 -20 Z" fill="url(#aur3)">
      <animateTransform attributeName="transform" type="translate" values="0 0;24 -8;-30 12;0 0" dur="19s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.55;0.85;0.6;0.55" dur="15s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- neural constellation woven into the aurora -->
  <g stroke="#2b4a5e" stroke-width="1">
    <path d="M95 120 L170 95"/><path d="M170 95 L250 118"/><path d="M170 95 L210 60"/>
    <path d="M250 118 L210 60"/><path d="M250 118 L320 100"/>
    <path d="M905 120 L830 95"/><path d="M830 95 L750 118"/><path d="M830 95 L790 60"/>
    <path d="M750 118 L790 60"/><path d="M750 118 L680 100"/>
  </g>
  <g filter="url(#soft)">
    <circle cx="95" cy="120" r="3" fill="#3dffb8"><animate attributeName="r" values="3;4.5;3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="170" cy="95" r="3.5" fill="#7ee7ff"><animate attributeName="r" values="3.5;5;3.5" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="210" cy="60" r="2.5" fill="#b593ff"><animate attributeName="r" values="2.5;4;2.5" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="118" r="3" fill="#3dffb8"><animate attributeName="r" values="3;4.5;3" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="100" r="2.5" fill="#7ee7ff"><animate attributeName="r" values="2.5;4;2.5" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="905" cy="120" r="3" fill="#3dffb8"><animate attributeName="r" values="3;4.5;3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="830" cy="95" r="3.5" fill="#7ee7ff"><animate attributeName="r" values="3.5;5;3.5" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="790" cy="60" r="2.5" fill="#b593ff"><animate attributeName="r" values="2.5;4;2.5" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="118" r="3" fill="#3dffb8"><animate attributeName="r" values="3;4.5;3" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="680" cy="100" r="2.5" fill="#7ee7ff"><animate attributeName="r" values="2.5;4;2.5" dur="3.3s" repeatCount="indefinite"/></circle>
  </g>
  <!-- signals travelling the constellation -->
  <circle r="2.2" fill="#eafffa" filter="url(#soft)"><animateMotion dur="4s" repeatCount="indefinite" path="M95 120 L170 95 L250 118 L320 100"/></circle>
  <circle r="2.2" fill="#eafffa" filter="url(#soft)"><animateMotion dur="4.4s" begin="1s" repeatCount="indefinite" path="M905 120 L830 95 L750 118 L680 100"/></circle>

  <!-- snow ridge + pine silhouettes -->
  <path d="M0 305 L120 285 L220 300 L340 278 L470 302 L600 280 L720 300 L850 282 L1000 300 L1000 360 L0 360 Z" fill="#04060e"/>
  <g fill="#04060e">
    <path d="M140 305 L152 272 L164 305 Z"/><path d="M158 305 L170 262 L182 305 Z"/><path d="M176 305 L186 278 L196 305 Z"/>
    <path d="M806 302 L818 268 L830 302 Z"/><path d="M824 302 L836 258 L848 302 Z"/><path d="M842 302 L852 275 L862 302 Z"/>
  </g>
  <!-- aurora reflection on snow -->
  <path d="M0 306 L1000 302 L1000 312 L0 316 Z" fill="#3dffb8" opacity="0.08">
    <animate attributeName="opacity" values="0.05;0.14;0.05" dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- TITLE -->
  <text x="500" y="185" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" letter-spacing="10" fill="url(#titleAur)" filter="url(#glow)">VIRAL PATEL</text>
  <line x1="360" y1="205" x2="640" y2="205" stroke="#3dffb8" stroke-width="1" opacity="0.7">
    <animate attributeName="x1" values="480;360;480" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="520;640;520" dur="6s" repeatCount="indefinite"/>
  </line>
  <text x="500" y="232" text-anchor="middle" font-family="Fira Code, Consolas, monospace" font-size="14" letter-spacing="6" fill="#9fd4c8">FOUNDER · AI ENGINEER · SUOMI</text>
  <text x="500" y="262" text-anchor="middle" font-family="Fira Code, Consolas, monospace" font-size="12.5" fill="#7ee7ff" opacity="0.9">⟡ intelligence, like the aurora — always in motion ⟡
    <animate attributeName="opacity" values="0.9;0.45;0.9" dur="4s" repeatCount="indefinite"/>
  </text>
</svg>
